name: CI/CD Java App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Build JAR
      run: mvn clean package

    - name: Build Docker Image
      run: docker build -t java-app .

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-southeast-2

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 002501541190.dkr.ecr.ap-southeast-2.amazonaws.com

    - name: Tag Image
      run: docker tag java-app:latest 002501541190.dkr.ecr.ap-southeast-2.amazonaws.com/java-app:latest

    - name: Push Image
      run: docker push 002501541190.dkr.ecr.ap-southeast-2.amazonaws.com/java-app:latest
